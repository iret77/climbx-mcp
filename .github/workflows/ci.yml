name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # engines requires node >=20; test the floor and current LTS.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      # The published entry point is the committed bundle dist/index.mjs. Rebuild it
      # from source and fail if it drifts, so npx never serves stale code. esbuild is
      # pinned via package-lock.json, so a fresh build is byte-identical.
      - name: Bundle is reproducible from source
        run: |
          npm run build:bin
          git diff --exit-code -- dist/index.mjs
      # Smoke: the bundle loads and the MCP server initializes. stderr carries the
      # startup diagnostics; stdout must carry only the JSON-RPC protocol, so we
      # assert the two streams separately and that stdout is not polluted.
      - name: Server bundle boots over stdio
        run: |
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            | timeout 5 node dist/index.mjs >stdout.log 2>stderr.log || true
          echo "--- stdout ---"; cat stdout.log
          echo "--- stderr ---"; cat stderr.log
          grep -q "running on stdio" stderr.log
          grep -q '"jsonrpc"' stdout.log
          if grep -q "\[climbx-mcp\] starting" stdout.log; then echo "startup log leaked into stdout"; exit 1; fi
